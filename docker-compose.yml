services:
  api:
    build: .
    image: dev-landing-backend
    container_name: dev-landing-backend
    restart: unless-stopped
    env_file: .env
    ports:
      # Bind to localhost only — a reverse proxy (Caddy/nginx) terminates TLS in front.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
